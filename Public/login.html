<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | UrbanRisk AI</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,180,255,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(255,0,80,0.18), transparent 30%),
        #07111f;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 100%;
      max-width: 430px;
      padding: 30px;
    }

    .login-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      margin: auto;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        135deg,
        rgba(0,180,255,0.2),
        rgba(255,0,80,0.15)
      );
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 2rem;
      color: #33d6ff;
    }

    .logo h1 {
      margin: 20px 0 5px;
      font-size: 2rem;
    }

    .logo p {
      margin: 0;
      color: #9fb2cc;
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .login-panel {
      display: none;
    }

    .login-panel.active {
      display: block;
    }

    .subtitle {
      text-align: center;
      color: #9fb2cc;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #d7e4f7;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #6f85a4;
    }

    .form-control {
      width: 100%;
      box-sizing: border-box;
      padding: 15px 18px 15px 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .form-control:focus {
      border-color: #33d6ff;
      box-shadow: 0 0 15px rgba(51,214,255,0.2);
    }

    .form-control::placeholder {
      color: #70839f;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      margin: -6px 0 18px;
    }

    .login-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: #04111d;
      background: linear-gradient(
        135deg,
        #67e8f9,
        #2dd4ff
      );
      transition: .3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(45,212,255,.25);
    }

    .text-btn {
      border: none;
      padding: 0;
      background: transparent;
      color: #33d6ff;
      cursor: pointer;
      font-weight: bold;
    }

    .text-btn:hover {
      text-decoration: underline;
    }

    .error-message,
    .success-message {
      display: none;
      margin-top: 15px;
      text-align: center;
    }

    .error-message {
      color: #ff6b81;
    }

    .success-message {
      color: #43e58f;
      line-height: 1.5;
    }

    .reset-code-note {
      display: none;
      margin: 15px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      color: #d7e4f7;
      background: rgba(51,214,255,0.09);
      border: 1px solid rgba(51,214,255,0.18);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .reset-code-note strong {
      color: #67e8f9;
    }

    .back-home {
      margin-top: 20px;
      text-align: center;
    }

    .back-home a {
      color: #33d6ff;
      text-decoration: none;
    }

    .back-home a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-shield-halved"></i>
      </div>

      <h1>UrbanRisk AI</h1>
      <p>Emergency Decision Support</p>
    </div>

    <div class="login-panel active" id="loginPanel">
      <h2>Login</h2>
      <p class="subtitle">
        Sign in to access the Urban Emergency Monitoring System
      </p>

      <form id="loginForm">

        <div class="form-group">
          <label>Email</label>

          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>

            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>

          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>

            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="text-btn" id="showForgotPassword">
            Forgot password?
          </button>
        </div>

        <button type="submit" class="login-btn">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login
        </button>

        <p id="errorMessage" class="error-message"></p>

      </form>
    </div>

    <div class="login-panel" id="forgotPanel">
      <h2>Reset Password</h2>
      <p class="subtitle">
        Enter your email to generate a temporary reset code.
      </p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label>Email</label>

          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>

            <input
              type="email"
              id="resetEmail"
              class="form-control"
              placeholder="Enter account email"
              required
            />
          </div>
        </div>

        <button type="submit" class="login-btn">
          <i class="fa-solid fa-key"></i>
          Get Reset Code
        </button>

        <p id="resetCodeNote" class="reset-code-note"></p>
        <p id="forgotMessage" class="error-message"></p>
      </form>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label>Reset Code</label>

          <div class="input-wrapper">
            <i class="fa-solid fa-hashtag"></i>

            <input
              type="text"
              id="resetCode"
              class="form-control"
              placeholder="Enter reset code"
              inputmode="numeric"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>New Password</label>

          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>

            <input
              type="password"
              id="newPassword"
              class="form-control"
              placeholder="Enter new password"
              minlength="6"
              required
            />
          </div>
        </div>

        <button type="submit" class="login-btn">
          <i class="fa-solid fa-rotate-right"></i>
          Reset Password
        </button>

        <p id="resetMessage" class="success-message"></p>
      </form>

      <div class="back-home">
        <button type="button" class="text-btn" id="showLogin">
          Back to login
        </button>
      </div>
    </div>

    <div class="back-home">
      <a href="/">&larr; Back to Home</a>
    </div>

  </div>
</div>

<script src="js/login.js"></script>

</body>
</html>
